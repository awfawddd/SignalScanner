name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Gradle 8.2
      run: |
        wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
        unzip -q gradle-8.2-bin.zip
        echo "$PWD/gradle-8.2/bin" >> $GITHUB_PATH

    - name: Fix project files
      run: |
        cd SignalScanner
        
        # Remove package from manifest (namespace is in build.gradle)
        sed -i 's/package="com.signalscanner"//' app/src/main/AndroidManifest.xml
        
        # Create launcher icon (simple green circle)
        mkdir -p app/src/main/res/mipmap-hdpi
        mkdir -p app/src/main/res/mipmap-mdpi
        mkdir -p app/src/main/res/mipmap-xhdpi
        mkdir -p app/src/main/res/mipmap-xxhdpi
        
        # Generate simple PNG icon using ImageMagick
        sudo apt-get install -y imagemagick -qq
        convert -size 48x48 xc:none -fill '#00E5FF' -draw 'circle 24,24 24,2' -fill white -font Helvetica -pointsize 20 -gravity center -draw "text 0,0 'S'" app/src/main/res/mipmap-mdpi/ic_launcher.png
        convert -size 72x72 xc:none -fill '#00E5FF' -draw 'circle 36,36 36,3' -fill white -font Helvetica -pointsize 30 -gravity center -draw "text 0,0 'S'" app/src/main/res/mipmap-hdpi/ic_launcher.png
        convert -size 96x96 xc:none -fill '#00E5FF' -draw 'circle 48,48 48,4' -fill white -font Helvetica -pointsize 40 -gravity center -draw "text 0,0 'S'" app/src/main/res/mipmap-xhdpi/ic_launcher.png
        convert -size 144x144 xc:none -fill '#00E5FF' -draw 'circle 72,72 72,6' -fill white -font Helvetica -pointsize 60 -gravity center -draw "text 0,0 'S'" app/src/main/res/mipmap-xxhdpi/ic_launcher.png

    - name: Build APK
      run: |
        cd SignalScanner
        rm -f gradlew
        gradle wrapper --gradle-version 8.2
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: SignalScanner-APK
        path: SignalScanner/app/build/outputs/apk/debug/*.apk
